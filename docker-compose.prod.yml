services:
  nginx:
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf
      - ./web/dist:/var/www/jyogi-oauth/dist
    restart: unless-stopped

  auth-server:
    env_file:
      - ./config/.env.prod
    restart: unless-stopped

  resource-server:
    env_file:
      - ./config/.env.prod
    restart: unless-stopped

  redis:
    restart: unless-stopped

  postgres:
    env_file:
      - ./config/.env.prod
    restart: unless-stopped
