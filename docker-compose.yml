services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./web/dist:/var/www/jyogi-oauth/dist
    depends_on:
      - auth-server
      - resource-server
    networks:
      - frontend

  auth-server:
    build: ./auth-server
    expose:
      - "8080"
    env_file:
      - ./config/.env.dev
    volumes:
      - ./keys:/keys:ro
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - frontend
      - backend

  resource-server:
    build: ./resource-server
    expose:
      - "8081"
    env_file:
      - ./config/.env.dev
    depends_on:
      postgres:
        condition: service_healthy
      auth-server:
        condition: service_started
    networks:
      - frontend
      - backend

  redis:
    image: redis:7-alpine
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy volatile-ttl
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

  postgres:
    image: postgres:16-alpine
    env_file:
      - ./config/.env.dev
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - backend

volumes:
  redis-data:
  postgres-data:

networks:
  frontend:
  backend:
